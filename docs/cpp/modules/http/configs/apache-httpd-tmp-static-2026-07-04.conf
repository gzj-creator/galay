ServerRoot "/usr"
Listen 127.0.0.1:18082
PidFile "/tmp/galay-httpd-runtime/httpd.pid"
ErrorLog "/tmp/galay-httpd-runtime/error.log"
CustomLog "/tmp/galay-httpd-runtime/access.log" common
LogLevel warn
ServerName 127.0.0.1
LoadModule mpm_prefork_module libexec/apache2/mod_mpm_prefork.so
LoadModule authz_core_module libexec/apache2/mod_authz_core.so
LoadModule authz_host_module libexec/apache2/mod_authz_host.so
LoadModule mime_module libexec/apache2/mod_mime.so
LoadModule log_config_module libexec/apache2/mod_log_config.so
LoadModule unixd_module libexec/apache2/mod_unixd.so
LoadModule dir_module libexec/apache2/mod_dir.so
LoadModule alias_module libexec/apache2/mod_alias.so
TypesConfig "/private/etc/apache2/mime.types"
DocumentRoot "/tmp/galay-httpd-www"
DirectoryIndex index.html
KeepAlive On
MaxKeepAliveRequests 100000
KeepAliveTimeout 60
Timeout 5
<IfModule mpm_prefork_module>
    StartServers 4
    MinSpareServers 4
    MaxSpareServers 8
    MaxRequestWorkers 100
    MaxConnectionsPerChild 0
</IfModule>
<Directory "/tmp/galay-httpd-www">
    Require all granted
    Options -Indexes
    AllowOverride None
</Directory>
