User _www
Group _www
TypesConfig "/private/etc/apache2/mime.types"
DocumentRoot "/Users/gongzhijie/Desktop/projects/git/galay/docs/cpp/modules/http/configs/www"
DirectoryIndex index.html
KeepAlive On
MaxKeepAliveRequests 100000
KeepAliveTimeout 60
