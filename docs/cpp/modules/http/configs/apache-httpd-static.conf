<IfModule mpm_prefork_module>
    StartServers 4
    MinSpareServers 4
    MaxSpareServers 8
    MaxRequestWorkers 100
    MaxConnectionsPerChild 0
</IfModule>

<Directory "/Users/gongzhijie/Desktop/projects/git/galay/docs/cpp/modules/http/configs/www">
