ServerRoot "/usr"
Listen 127.0.0.1:18082
PidFile "/Users/gongzhijie/Desktop/projects/git/galay/docs/cpp/modules/http/configs/httpd-runtime/httpd.pid"
ErrorLog "/Users/gongzhijie/Desktop/projects/git/galay/docs/cpp/modules/http/configs/httpd-runtime/error.log"
CustomLog "/Users/gongzhijie/Desktop/projects/git/galay/docs/cpp/modules/http/configs/httpd-runtime/access.log" common
LogLevel warn
ServerName 127.0.0.1

LoadModule mpm_prefork_module libexec/apache2/mod_mpm_prefork.so
LoadModule authz_core_module libexec/apache2/mod_authz_core.so
LoadModule authz_host_module libexec/apache2/mod_authz_host.so
